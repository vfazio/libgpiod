name: Build

on:
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.10'] #, '3.11', '3.12', '3.13', '3.14', '3.14t']
    name: Testi Python bindings using ${{ matrix.python-version }}
    steps:
      # - name: Check system information
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y linux-modules-6.17.0-1008-azure
      #     sudo apt-get install -y linux-modules-extra-$(uname -r)
      #     uname -a
      #     find /lib/modules/
      #     cat /boot/config-$(uname -r)
      #     exit 1
      - uses: actions/checkout@v6
      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            linux-modules-extra-$(uname -r)
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            libkmod-dev \
            libmount-dev \
            libglib2.0-dev
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools
      - name: Configure build
        run: |
          ./autogen.sh --enable-bindings-python --enable-tests
      - name: Run build
        run: |
          make -j$(nproc)
      - name: Build python test suite
        run: |
          cd bindings/python
          make python-tests
      - name: Run python test suite
        run: |
          cd bindings/python
          make python-tests-run